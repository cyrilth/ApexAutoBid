# Allow the default `guest` user to authenticate from any host, not just
# loopback (127.0.0.1). Needed because the .NET services connect to RabbitMQ
# from the host (`dotnet run`) or across the Docker network — never from
# 127.0.0.1 inside the container — while RabbitMQ restricts `guest` to loopback
# connections by default. Dev-only convenience; production uses per-service
# credentials supplied via environment variables (Requirements §6).
loopback_users = none
